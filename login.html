<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Iniciar sesión | EliteCard</title>
    <meta name="theme-color" content="#050505" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", system-ui, sans-serif;
        color: #e0e0e0;
        background: linear-gradient(165deg, #050505 0%, #101010 50%, #0d0d0d 100%);
        min-height: 100dvh;
      }
      .glass {
        background: rgba(24, 24, 24, 0.44);
        border: 1px solid rgba(212, 175, 55, 0.22);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
      }
      .in {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(5, 5, 5, 0.6);
        padding: 12px 14px;
      }
      .in:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.35);
      }
    </style>
  </head>
  <body class="antialiased">
    <main class="mx-auto flex min-h-[100dvh] max-w-lg items-center px-5 py-10">
      <section class="glass w-full rounded-[1.4rem] p-8">
        <p class="text-[11px] uppercase tracking-[0.28em] text-[#d4af37]">EliteCard</p>
        <h1 class="mt-3 text-3xl font-light text-white">Iniciar sesión</h1>
        <p class="mt-2 text-sm text-white/55">Accedé al panel Cameleon para gestionar EliteCard o MascotBook.</p>
        <form id="login-form" class="mt-6 space-y-3">
          <input id="email" type="email" class="in" placeholder="Email" required />
          <input id="password" type="password" class="in" placeholder="Contraseña" required />
          <p id="err" class="hidden text-sm text-red-300"></p>
          <button
            id="btn-login"
            type="submit"
            class="w-full rounded-full bg-[#d4af37] py-3 text-sm font-semibold uppercase tracking-[0.12em] text-black"
          >
            Entrar
          </button>
        </form>
        <p class="mt-5 text-center text-sm text-white/60">
          ¿Sin cuenta?
          <a id="link-register" href="register.html" class="text-[#d4af37]">Crear cuenta</a>
        </p>
      </section>
    </main>
    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script>
      (function () {
        function normalizeApp(a) {
          var v = String(a || "").trim().toLowerCase();
          return v === "mascotbook" ? "mascotbook" : "elitecard";
        }
        function getNextHref() {
          try {
            var q = new URLSearchParams(window.location.search);
            var n = q.get("next");
            if (n && n.indexOf("://") === -1 && n.indexOf("//") === -1) return n;
          } catch (e) {}
          return "admin.html";
        }
        function readAppHint() {
          try {
            var q = new URLSearchParams(window.location.search);
            return normalizeApp(q.get("app"));
          } catch (e2) {
            return "elitecard";
          }
        }
        var reg = document.getElementById("link-register");
        if (reg) {
          try {
            var app = readAppHint();
            reg.href = "register.html?app=" + encodeURIComponent(app);
          } catch (e3) {}
        }

        var cfg = window.FIREBASE_WEB_CONFIG;
        if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("REEMPLAZAR") !== -1) return;
        try {
          firebase.initializeApp(cfg);
        } catch (e4) {}
        var auth = firebase.auth();
        auth.onAuthStateChanged(function (u) {
          if (u) window.location.replace(getNextHref());
        });
        try {
          var ah = readAppHint();
          localStorage.setItem("ec_current_app", ah);
        } catch (e5) {}
        var form = document.getElementById("login-form");
        var err = document.getElementById("err");
        var btn = document.getElementById("btn-login");
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err.classList.add("hidden");
          btn.disabled = true;
          auth
            .signInWithEmailAndPassword(
              String(document.getElementById("email").value || "").trim(),
              document.getElementById("password").value || ""
            )
            .then(function () {
              window.location.href = getNextHref();
            })
            .catch(function (ex) {
              err.textContent = (ex && ex.message) || "No se pudo iniciar sesión.";
              err.classList.remove("hidden");
              btn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
