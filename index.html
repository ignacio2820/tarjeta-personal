<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>EliteCard | Tu Identidad Digital de Élite</title>
    <meta
      name="description"
      content="Haz clic para ver mis datos de contacto actualizados."
    />
    <meta name="application-name" content="EliteCard - Tarjeta Digital" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EliteCard | Perfil Profesional" />
    <meta
      property="og:description"
      content="Haz clic para ver mis datos de contacto actualizados."
    />
    <meta property="og:locale" content="es" />
    <meta
      property="og:image"
      content="https://tarjeta-profesional-pedro.web.app/icons/icon-512.png"
    />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="EliteCard — marca dorada" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EliteCard | Perfil Profesional" />
    <meta
      name="twitter:description"
      content="Haz clic para ver mis datos de contacto actualizados."
    />
    <meta
      name="twitter:image"
      content="https://tarjeta-profesional-pedro.web.app/icons/icon-512.png"
    />
    <meta name="theme-color" content="#050505" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EliteCard" />
    <meta name="msapplication-TileColor" content="#050505" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <!-- Visor universal: Firestore usuarios/{id}. URL ?id=IDENTIFICADOR (también ?user= / ?uid=). Sin id → perfil por defecto (FIRESTORE_DEFAULT_CARD_UID o "perfil"). -->
  <body class="luxury-body preloader-active min-h-[100dvh] font-light antialiased">
    <!-- Splash: fondo negro + marca EliteCard en 3D hasta la primera respuesta de Firestore -->
    <div id="preloader" aria-busy="true" aria-label="Cargando EliteCard">
      <div class="preloader-scene">
        <div class="preloader-y-spin">
          <div class="preloader-x-float">
            <div class="preloader-logo-wrap">
              <img
                id="preloader-logo-img"
                class="preloader-logo-img"
                src="icons/icon-192.png"
                alt="EliteCard"
                width="84"
                height="84"
                decoding="async"
                fetchpriority="high"
              />
              <span class="preloader-shine" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Perfil inexistente, enlace inválido o error explícito (solo oculta la tarjeta) -->
    <div
      id="profile-not-found"
      class="fixed inset-0 z-[9990] hidden min-h-[100dvh] flex-col items-center justify-center bg-[#050505] px-8 text-center"
      role="alert"
      aria-live="polite"
    >
      <div
        class="ec-modal-elite-panel max-w-sm rounded-[1.35rem] px-8 py-10 text-left sm:text-center"
      >
        <p
          class="mb-2 font-mono text-[0.65rem] font-medium uppercase tracking-[0.35em] text-[#d4af37]/95"
        >
          EliteCard
        </p>
        <h1
          id="profile-not-found-title"
          class="text-xl font-medium tracking-tight text-[#ebe6dc] sm:text-2xl"
        >
          Perfil no encontrado
        </h1>
        <p
          id="profile-not-found-desc"
          class="mt-4 text-sm font-light leading-relaxed text-[#e0e0e0]/48"
        >
          Este enlace no corresponde a un perfil activo.
        </p>
      </div>
      <a
        class="webelite-credit mt-14"
        href="https://webelite-app.vercel.app/"
        target="_blank"
        rel="noopener noreferrer"
      >
        EliteCard™ by <span class="webelite-credit-brand">WebElite Solutions</span>
      </a>
    </div>

    <div
      id="app-root"
      class="ec-card-container app-shell ec-app-shell mx-auto flex min-h-[100dvh] w-full max-w-[min(100vw,56.25dvh)] flex-col"
    >
      <header class="flex flex-col items-center px-5 pb-5 pt-8 text-center">
        <div class="avatar-led-wrap reveal-item reveal-d1 mb-6">
          <div class="avatar-led-halo" aria-hidden="true"></div>
          <div class="avatar-gold-ring">
            <div class="avatar-inner">
              <img
                id="avatar-img"
                class="avatar-photo"
                src=""
                alt=""
                width="160"
                height="200"
                decoding="async"
                referrerpolicy="no-referrer"
              />
            </div>
          </div>
        </div>
        <h1
          id="display-name"
          class="led-name reveal-item reveal-d2 max-w-[20rem] px-1 text-lg font-medium leading-tight sm:text-[1.35rem]"
        ></h1>
        <p
          id="display-role"
          class="led-sub reveal-item reveal-d3 mt-2.5 max-w-[19rem]"
        ></p>
        <p
          id="display-cargo-detalle"
          class="led-sub reveal-item reveal-d4 mt-1 max-w-[19rem]"
          hidden
        ></p>
        <p
          id="display-org"
          class="led-sub reveal-item reveal-d5 mt-1 max-w-[19rem]"
          hidden
        ></p>
        <p
          id="display-bio"
          class="led-sub reveal-item reveal-d6 mt-4 hidden max-w-sm leading-relaxed"
        ></p>
      </header>

      <!-- FIX: pb aumentado para que el último botón no quede tapado por el footer fijo -->
      <main
        class="links-stagger flex flex-1 flex-col gap-3 px-4 pb-[calc(5.5rem+env(safe-area-inset-bottom))]"
        id="links-container"
      ></main>

      <!-- FIX: pb aumentado para que el crédito no quede tapado en celulares con notch/home bar -->
      <div
        class="webelite-credit-outer mx-auto w-full max-w-[min(100vw,56.25dvh)] shrink-0 px-4 pb-[calc(7.5rem+env(safe-area-inset-bottom))] pt-1 text-center"
      >
        <a
          class="webelite-credit"
          href="https://webelite-app.vercel.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          EliteCard™ by <span class="webelite-credit-brand">WebElite Solutions</span>
        </a>
      </div>

      <footer
        class="footer-bar-light footer-reveal fixed bottom-0 left-0 right-0 z-20 flex justify-center px-2 pb-[max(0.45rem,env(safe-area-inset-bottom))] pt-1.5"
      >
        <div
          class="flex w-full max-w-[min(100vw,56.25dvh)] flex-col items-stretch"
        >
          <div
            id="footer-seal-wrap"
            class="footer-seal-wrap footer-seal-reveal mb-1.5 hidden-seal flex justify-center"
          >
            <div class="footer-seal-ring">
              <img
                id="footer-institutional-logo"
                class="footer-seal-img"
                src=""
                alt=""
                width="32"
                height="32"
                decoding="async"
                referrerpolicy="no-referrer"
              />
            </div>
          </div>
          <div class="flex items-stretch justify-stretch gap-0">
            <button
              type="button"
              id="btn-vcard"
              class="ec-contact-button pill-action flex flex-1 items-center justify-center gap-2 border-r border-black/12 py-2.5"
            >
              <img
                id="footer-avatar"
                src=""
                alt=""
                class="footer-avatar-mini shrink-0"
                width="22"
                height="22"
              />
              <span class="footer-action-label">Guardar contacto</span>
            </button>
            <button
              type="button"
              id="btn-share"
              class="ec-contact-button pill-action flex flex-1 items-center justify-center gap-2 py-2.5"
            >
              <i
                class="fa-solid fa-qrcode footer-icon-gold text-base sm:text-lg"
                aria-hidden="true"
              ></i>
              <span class="footer-action-label">Compartir</span>
            </button>
          </div>
        </div>
      </footer>
    </div>

    <div
      id="toast"
      class="ec-toast-elite pointer-events-none fixed bottom-24 left-1/2 z-30 hidden -translate-x-1/2 rounded-full px-4 py-2 text-xs shadow-lg"
      role="status"
    ></div>

    <!-- Modal WhatsApp -->
    <div
      id="wa-modal"
      class="ec-modal-elite-backdrop fixed inset-0 z-50 hidden items-end justify-center p-3 sm:items-center"
      role="dialog"
      aria-modal="true"
      aria-labelledby="wa-modal-title"
    >
      <div
        class="ec-modal-elite-panel max-h-[90dvh] w-full max-w-md overflow-y-auto rounded-[1.35rem] p-5 shadow-2xl sm:p-6"
      >
        <div class="mb-4 flex items-start justify-between gap-2">
          <h2 id="wa-modal-title" class="text-lg font-medium tracking-tight text-[#ebe6dc]">
            Contactame por WhatsApp
          </h2>
          <button
            type="button"
            id="wa-modal-close"
            class="rounded-xl p-2 text-[#e0e0e0]/45 transition hover:bg-white/5 hover:text-[#ebe6dc]"
            aria-label="Cerrar"
          >
            <i class="fa-solid fa-xmark text-lg" aria-hidden="true"></i>
          </button>
        </div>
        <p class="mb-4 text-xs font-light text-[#e0e0e0]/48">
          Completá tus datos y se abrirá WhatsApp con el mensaje listo para enviar.
        </p>
        <div class="flex flex-col gap-3">
          <label class="block">
            <span class="mb-1 block text-[11px] font-medium uppercase tracking-wider text-[#d4af37]/85"
              >Nombre</span
            >
            <input
              id="wa-nombre"
              type="text"
              autocomplete="given-name"
              class="ec-input-elite w-full rounded-xl px-3 py-2.5 text-sm placeholder:text-[#e0e0e0]/28 focus:border-[#25D366] focus:shadow-[0_0_0_1px_rgba(37,211,102,0.35)]"
              placeholder="Nombre"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-[11px] font-medium uppercase tracking-wider text-[#d4af37]/85"
              >Apellido</span
            >
            <input
              id="wa-apellido"
              type="text"
              autocomplete="family-name"
              class="ec-input-elite w-full rounded-xl px-3 py-2.5 text-sm placeholder:text-[#e0e0e0]/28 focus:border-[#25D366] focus:shadow-[0_0_0_1px_rgba(37,211,102,0.35)]"
              placeholder="Apellido"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-[11px] font-medium uppercase tracking-wider text-[#d4af37]/85"
              >Teléfono</span
            >
            <input
              id="wa-telefono"
              type="tel"
              autocomplete="tel"
              inputmode="tel"
              class="ec-input-elite w-full rounded-xl px-3 py-2.5 text-sm placeholder:text-[#e0e0e0]/28 focus:border-[#25D366] focus:shadow-[0_0_0_1px_rgba(37,211,102,0.35)]"
              placeholder="Tu número de contacto"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-[11px] font-medium uppercase tracking-wider text-[#d4af37]/85"
              >Comentario</span
            >
            <textarea
              id="wa-comentario"
              rows="3"
              class="ec-input-elite w-full resize-y rounded-xl px-3 py-2.5 text-sm placeholder:text-[#e0e0e0]/28 focus:border-[#25D366] focus:shadow-[0_0_0_1px_rgba(37,211,102,0.35)]"
              placeholder="Escribí tu mensaje o consulta"
            ></textarea>
          </label>
          <button
            type="button"
            id="wa-iniciar"
            class="mt-2 flex w-full items-center justify-center gap-2 rounded-full bg-[#25D366] py-3.5 text-sm font-bold text-white transition hover:bg-[#20bd5a]"
          >
            <i class="fa-brands fa-whatsapp text-lg" aria-hidden="true"></i>
            Iniciar WhatsApp
          </button>
        </div>
      </div>
    </div>

    <!-- Fuerza generación de utilidades usadas solo desde JS (Tailwind CDN) -->
    <span
      class="hidden bg-[#25D366] bg-[#EA4335] bg-[#0A66C2] bg-[#34A853] bg-gradient-to-br from-[#f58529] via-[#dd2a7b] to-[#8134af] ring-2 ring-amber-500/40"
      aria-hidden="true"
    ></span>

    <!-- Modal Calendly (embed) -->
    <div
      id="cal-modal"
      class="ec-modal-elite-backdrop fixed inset-0 z-50 hidden items-end justify-center p-3 sm:items-center"
      role="dialog"
      aria-modal="true"
      aria-labelledby="cal-modal-title"
    >
      <div
        class="cal-modal-panel ec-modal-elite-panel flex max-h-[92dvh] w-full max-w-lg flex-col overflow-hidden rounded-[1.35rem] shadow-2xl"
      >
        <div
          class="flex shrink-0 items-center justify-between gap-2 border-b border-white/[0.08] px-4 py-3"
        >
          <h2 id="cal-modal-title" class="text-base font-medium tracking-tight text-[#ebe6dc]">
            Agendar cita
          </h2>
          <button
            type="button"
            id="cal-modal-close"
            class="rounded-xl p-2 text-[#e0e0e0]/45 transition hover:bg-white/5 hover:text-[#ebe6dc]"
            aria-label="Cerrar"
          >
            <i class="fa-solid fa-xmark text-lg" aria-hidden="true"></i>
          </button>
        </div>
        <div class="min-h-0 flex-1 bg-[#050505] p-2">
          <iframe
            id="cal-iframe"
            src="about:blank"
            class="h-[min(70dvh,32rem)] w-full rounded-xl border border-white/10 bg-white"
            title="Calendly"
            loading="lazy"
          ></iframe>
        </div>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="config.js?v=9"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="card-app.js?v=13"></script>
    <script>
(function() {
  // Banner instalación PWA — Chrome Android
  var deferredPrompt = null;
  var installBanner = null;

  function createInstallBanner() {
    if (installBanner) return;
    installBanner = document.createElement("div");
    installBanner.id = "pwa-install-banner";
    installBanner.setAttribute("role", "banner");
    installBanner.style.cssText = [
      "position:fixed",
      "bottom:calc(5.5rem + env(safe-area-inset-bottom))",
      "left:50%",
      "transform:translateX(-50%)",
      "z-index:9999",
      "display:flex",
      "align-items:center",
      "gap:10px",
      "background:rgba(18,18,18,0.97)",
      "border:1px solid rgba(212,175,55,0.45)",
      "border-radius:9999px",
      "padding:10px 18px 10px 14px",
      "box-shadow:0 8px 32px rgba(0,0,0,0.55)",
      "backdrop-filter:blur(16px)",
      "-webkit-backdrop-filter:blur(16px)",
      "cursor:pointer",
      "user-select:none",
      "max-width:calc(100vw - 2rem)",
      "animation:ec-banner-in .35s cubic-bezier(.22,1,.36,1)"
    ].join(";");

    var style = document.createElement("style");
    style.textContent = [
      "@keyframes ec-banner-in{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}",
      "@media(prefers-reduced-motion:reduce){#pwa-install-banner{animation:none}}"
    ].join("");
    document.head.appendChild(style);

    var icon = document.createElement("img");
    icon.src = "icons/icon-192.png";
    icon.width = 28;
    icon.height = 28;
    icon.style.cssText = "border-radius:6px;flex-shrink:0";
    icon.alt = "";

    var text = document.createElement("span");
    text.style.cssText = "font-size:13px;font-weight:300;color:#e0e0e0;letter-spacing:0.02em;white-space:nowrap";
    text.textContent = "Instalá EliteCard";

    var btn = document.createElement("span");
    btn.style.cssText = [
      "font-size:11px",
      "font-weight:600",
      "letter-spacing:0.1em",
      "text-transform:uppercase",
      "color:#0a0a0a",
      "background:linear-gradient(135deg,#c9a132,#d4af37 50%,#e8c547)",
      "border-radius:9999px",
      "padding:5px 12px",
      "flex-shrink:0",
      "margin-left:4px"
    ].join(";");
    btn.textContent = "Instalar";

    var close = document.createElement("button");
    close.type = "button";
    close.setAttribute("aria-label", "Cerrar");
    close.style.cssText = "background:none;border:none;color:rgba(224,224,224,0.4);font-size:16px;line-height:1;padding:0 0 0 4px;cursor:pointer;flex-shrink:0";
    close.textContent = "✕";

    installBanner.appendChild(icon);
    installBanner.appendChild(text);
    installBanner.appendChild(btn);
    installBanner.appendChild(close);
    document.body.appendChild(installBanner);

    // Click en el banner (excepto el X) → disparar prompt
    installBanner.addEventListener("click", function(e) {
      if (e.target === close) return;
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() {
        deferredPrompt = null;
        removeInstallBanner();
      });
    });

    // Click en X → cerrar sin instalar
    close.addEventListener("click", function(e) {
      e.stopPropagation();
      removeInstallBanner();
      // No volvemos a mostrar en esta sesión
      try { sessionStorage.setItem("ec-install-dismissed", "1"); } catch(e2) {}
    });
  }

  function removeInstallBanner() {
    if (!installBanner) return;
    installBanner.style.opacity = "0";
    installBanner.style.transition = "opacity .25s";
    setTimeout(function() {
      if (installBanner && installBanner.parentNode) {
        installBanner.parentNode.removeChild(installBanner);
      }
      installBanner = null;
    }, 280);
  }

  // No mostrar si ya fue descartado en esta sesión
  try {
    if (sessionStorage.getItem("ec-install-dismissed")) return;
  } catch(e3) {}

  window.addEventListener("beforeinstallprompt", function(e) {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar el banner 2s después de que cargó la tarjeta
    setTimeout(createInstallBanner, 2000);
  });

  // Ocultar si ya instaló
  window.addEventListener("appinstalled", function() {
    deferredPrompt = null;
    removeInstallBanner();
  });
})();
    </script>
  </body>
</html>
