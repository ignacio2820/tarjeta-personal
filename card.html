<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>EliteCard · MascotBook</title>
    <meta name="description" content="Tarjeta digital profesional o perfil social de mascota." />
    <meta name="theme-color" content="#0a0a0a" />
    <script>
      window.__EC_PAGE_LOAD_TS = Date.now();
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var uid =
            params.get("id") ||
            params.get("ID") ||
            params.get("user") ||
            params.get("uid") ||
            "";
          if (!uid && window.location.hash) {
            var m = window.location.hash.match(/(?:^|[?&#])id=([^&]+)/i);
            if (m && m[1]) {
              try {
                uid = decodeURIComponent(m[1]);
              } catch (e) {
                uid = m[1];
              }
            }
          }
          uid = String(uid || "").trim();
          if (!uid) {
            window.location.replace("index.html");
            return;
          }
          var origin = window.location.origin;
          var view = String(params.get("view") || "").trim().toLowerCase();
          var app =
            view === "pet" || view === "mascota" || view === "mascotbook"
              ? "mascotbook"
              : "elitecard";
          var manifestUrl =
            origin +
            "/manifest-user?id=" +
            encodeURIComponent(uid) +
            "&app=" +
            encodeURIComponent(app);
          function injectManifest() {
            var link = document.getElementById("manifest-link");
            if (link) link.href = manifestUrl;
            else {
              var newLink = document.createElement("link");
              newLink.rel = "manifest";
              newLink.id = "manifest-link";
              newLink.href = manifestUrl;
              document.head.appendChild(newLink);
            }
          }
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", injectManifest);
          } else injectManifest();
        } catch (e2) {}
      })();
    </script>
    <link rel="manifest" href="manifest.json" id="manifest-link" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="card-elite.css?v=6" />
    <link rel="stylesheet" href="mascot-themes.css?v=1" />
    <link rel="stylesheet" href="mascot-social.css?v=1" />
    <style>
      .hidden {
        display: none !important;
      }
      body {
        margin: 0;
        min-height: 100dvh;
      }
      #card-loading {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #d4af37;
        font-family: "Poppins", system-ui, sans-serif;
      }
      #card-loading.hidden {
        display: none;
      }
      .card-spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(212, 175, 55, 0.2);
        border-top-color: #d4af37;
        border-radius: 50%;
        animation: card-spin 0.7s linear infinite;
      }
      @keyframes card-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #card-not-found {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #ebe6dc;
        font-family: "Poppins", system-ui, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      #card-empty {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: rgba(235, 230, 220, 0.55);
        font-family: "Poppins", system-ui, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="card-loading" aria-busy="true">
      <div class="card-spinner" aria-hidden="true"></div>
    </div>

    <div id="card-not-found" class="hidden" role="alert">
      <p style="color: #d4af37; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase">
        Perfil
      </p>
      <h1 style="margin: 0.5rem 0 0; font-weight: 500">No encontramos esta tarjeta</h1>
      <p style="max-width: 22rem; line-height: 1.5; margin-top: 0.75rem">
        El enlace puede ser incorrecto o el perfil aún no está publicado.
      </p>
      <a href="index.html" style="margin-top: 1.5rem; color: #d4af37">Volver al inicio</a>
    </div>

    <div id="card-empty" class="hidden">
      <p>Aún no hay datos públicos en este perfil.</p>
    </div>

    <!-- EliteCard -->
    <div id="layout-elite" class="elite-shell elite-ghost hidden">
      <div class="ec-wrap">
        <header class="ec-head">
          <div class="ec-photo-ring">
            <img id="elite-photo" class="ec-photo hidden" src="" alt="" width="140" height="210" />
          </div>
          <h1 id="elite-name" class="ec-name"></h1>
          <p id="elite-role" class="ec-role"></p>
          <p id="elite-co" class="ec-co"></p>
        </header>
        <div id="elite-stack" class="ec-action-stack">
          <div id="elite-actions" class="ec-actions"></div>
        </div>
        <section id="elite-mail-sig" class="ec-mail-sig hidden" aria-label="Firma de correo">
          <h3 class="ec-mail-sig-title">Firma para correo</h3>
          <div id="elite-mail-sig-preview" class="ec-mail-sig-preview"></div>
          <div class="ec-mail-sig-actions">
            <button type="button" id="elite-mail-sig-copy-text" class="ec-mail-sig-btn">Copiar texto</button>
            <button type="button" id="elite-mail-sig-copy-html" class="ec-mail-sig-btn">Copiar HTML</button>
          </div>
        </section>
      </div>
      <footer class="ec-footer">
        <button type="button" id="elite-footer-vcf" class="ec-foot-btn">
          <span class="ec-foot-avatar-wrap" aria-hidden="true">
            <img id="elite-footer-thumb" class="ec-foot-thumb hidden" src="" alt="" width="28" height="28" />
            <span class="ec-foot-plus">+</span>
          </span>
          Guardar contacto
        </button>
        <button type="button" id="elite-footer-share" class="ec-foot-btn">
          <i class="fa-solid fa-qrcode ec-foot-qr" aria-hidden="true"></i>
          Compartir
        </button>
      </footer>
      <div id="elite-logo-footer" class="ec-logo-footer-float hidden" aria-hidden="true">
        <img id="elite-logo-footer-img" class="ec-logo-footer-img" src="" alt="" width="72" height="72" />
      </div>
      <div id="elite-qr-overlay" class="ec-qr-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="elite-qr-title">
        <div class="ec-qr-panel">
          <button type="button" id="elite-qr-close" class="ec-qr-close" aria-label="Cerrar">×</button>
          <p id="elite-qr-title" class="ec-qr-title">Compartir tarjeta</p>
          <img id="elite-qr-img" class="ec-qr-img" src="" alt="Código QR de la tarjeta" width="200" height="200" />
          <button type="button" id="elite-qr-copy" class="ec-qr-copy">Copiar enlace</button>
          <button type="button" id="elite-qr-share-native" class="ec-qr-native hidden">Compartir con el sistema…</button>
        </div>
      </div>
    </div>

    <!-- MascotBook — perfil tipo red social -->
    <div id="layout-mascot" class="hidden">
      <div id="mascot-shell" class="mb-social texture-elite">
        <div class="mb-ig-topbar">MascotBook</div>
        <div class="mb-ig-cover" aria-hidden="true"></div>
        <div class="mb-ig-profile">
          <div class="mb-ig-avatar-wrap">
            <img id="mascot-avatar" class="mb-ig-avatar hidden" src="" alt="" width="120" height="120" />
          </div>
          <div class="mb-ig-stats">
            <div>
              <strong id="mascot-stat-posts">0</strong>
              <span>publicaciones</span>
            </div>
            <div>
              <strong id="mascot-stat-followers">—</strong>
              <span>seguidores</span>
            </div>
            <div>
              <strong id="mascot-stat-following">—</strong>
              <span>siguiendo</span>
            </div>
          </div>
        </div>
        <div class="mb-ig-body">
          <h1 id="mascot-name" class="mb-ig-name"></h1>
          <p id="mascot-sub" class="mb-ig-sub"></p>
          <p id="mascot-bio" class="mb-ig-bio"></p>
          <div id="mascot-pills" class="mb-ig-pills"></div>
          <div class="mb-ig-tabs" aria-hidden="true">
            <span class="active">▦</span>
            <span>▶</span>
            <span>◎</span>
          </div>
          <div id="mascot-gallery" class="mb-ig-grid"></div>
          <div id="mascot-health-section" class="mb-ig-health hidden">
            <h2>Ficha y salud</h2>
            <div id="mascot-health"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var t = window.__EC_PAGE_LOAD_TS || Date.now();
        document.write('<script src="firebase-config.js?v=' + t + '"><\/script>');
        document.write('<script src="config.js?v=' + t + '"><\/script>');
        document.write('<script src="ec-silos.js?v=' + t + '"><\/script>');
        document.write('<script src="admin.js?v=' + t + '"><\/script>');
        document.write('<script src="elite-mail-sig.js?v=' + t + '"><\/script>');
      })();
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="card-public.js?v=3"></script>
  </body>
</html>
