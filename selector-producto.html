<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Proyectos | EliteCard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      body { font-family: "Poppins", system-ui, sans-serif; background: radial-gradient(circle at top,#111827 0%,#050505 45%,#050505 100%); color: #e5e7eb; }
      .hub-card { border: 1px solid rgba(255,255,255,.12); background: rgba(17,24,39,.62); backdrop-filter: blur(14px); transition: transform .25s ease,border-color .25s ease, box-shadow .25s ease; }
      .hub-card:hover { transform: translateY(-3px); border-color: rgba(212,175,55,.55); box-shadow: 0 20px 48px rgba(0,0,0,.35); }
      .skeleton { animation: pulse 1.15s ease-in-out infinite; background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06)); background-size: 200% 100%; }
      @keyframes pulse { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
      .fade-in { opacity: 0; transform: translateY(10px); transition: opacity .35s ease, transform .35s ease; }
      .fade-in.ready { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body class="min-h-screen antialiased">
    <main class="mx-auto max-w-5xl px-6 py-10 sm:py-14">
      <header class="mb-8 flex items-center justify-between gap-3">
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-[#d4af37]">Dashboard</p>
          <h1 class="mt-2 text-3xl font-semibold text-white sm:text-4xl">Mis Proyectos</h1>
        </div>
        <button id="btn-logout-selector" class="rounded-full border border-white/15 px-4 py-2 text-xs uppercase tracking-[0.14em] text-white/70">Cerrar sesión</button>
      </header>

      <section id="hub-skeleton" class="grid gap-5 sm:grid-cols-2">
        <div class="skeleton h-52 rounded-3xl"></div>
        <div class="skeleton h-52 rounded-3xl"></div>
      </section>

      <section id="hub-content" class="fade-in hidden grid gap-5 sm:grid-cols-2">
        <button type="button" data-app="elitecard" class="hub-card rounded-3xl p-7 text-left">
          <i class="fa-regular fa-id-card text-3xl text-[#d4af37]" aria-hidden="true"></i>
          <h2 class="mt-5 text-2xl font-semibold text-white">Gestionar mi Tarjeta Profesional</h2>
          <p class="mt-3 text-sm text-white/65">Contacto, firma de email, analíticas y diseño corporativo.</p>
        </button>
        <button type="button" data-app="mascotbook" class="hub-card rounded-3xl p-7 text-left">
          <i class="fa-solid fa-paw text-3xl text-[#86efac]" aria-hidden="true"></i>
          <h2 class="mt-5 text-2xl font-semibold text-white">Gestionar mi MascotBook</h2>
          <p class="mt-3 text-sm text-white/65">Perfil social pet, salud, aventuras y contacto familiar.</p>
        </button>
      </section>
      <p id="selector-error" class="mt-4 hidden text-sm text-red-300"></p>
    </main>
    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script>
      (function () {
        var cfg = window.FIREBASE_WEB_CONFIG;
        if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("REEMPLAZAR") !== -1) return;
        try { firebase.initializeApp(cfg); } catch (e) {}
        var auth = firebase.auth();
        var err = document.getElementById("selector-error");
        var skeleton = document.getElementById("hub-skeleton");
        var content = document.getElementById("hub-content");

        auth.onAuthStateChanged(function (u) {
          if (!u) { window.location.replace("login.html"); return; }
          if (skeleton) skeleton.classList.add("hidden");
          if (content) {
            content.classList.remove("hidden");
            setTimeout(function () { content.classList.add("ready"); }, 20);
          }
        });

        document.querySelectorAll("[data-app]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var app = btn.getAttribute("data-app") === "mascotbook" ? "mascotbook" : "elitecard";
            try { localStorage.setItem("ec_current_app", app); } catch (e) {}
            window.location.href = "admin.html?app=" + encodeURIComponent(app);
          });
        });

        document.getElementById("btn-logout-selector").addEventListener("click", function () {
          auth.signOut().then(function () { window.location.href = "login.html"; }).catch(function (ex) {
            if (err) { err.textContent = (ex && ex.message) || "No se pudo cerrar sesión."; err.classList.remove("hidden"); }
          });
        });
      })();
    </script>
  </body>
</html>
