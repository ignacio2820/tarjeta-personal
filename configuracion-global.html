<!DOCTYPE html>
<html lang="es" data-ec-config-global>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuración global · EliteCard</title>
    <meta name="theme-color" content="#f8fafc" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="admin-elite.css" id="ec-link-admin-elite" />
    <script>
      (function () {
        var v = Date.now();
        var b = document.getElementById("ec-link-admin-elite");
        if (b) b.href = "admin-elite.css?v=" + v;
      })();
    </script>
    <style>
      .ec-config-page {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        background: var(--ae-bg, #f8fafc);
        color: var(--ae-text, #0f172a);
        font-family: "Inter", system-ui, sans-serif;
      }
      .ec-config-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 1rem 1.35rem;
        border-bottom: 1px solid var(--ae-border, #e2e8f0);
        background: #fff;
      }
      .ec-config-brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        font-weight: 700;
        font-size: 1.05rem;
      }
      .ec-config-main {
        flex: 1;
        padding: 1.5rem 1.25rem 2.5rem;
        max-width: 36rem;
        width: 100%;
        margin: 0 auto;
        box-sizing: border-box;
      }
      .ec-config-lead {
        margin: 0 0 1.25rem;
        font-size: 0.95rem;
        color: var(--ae-muted, #64748b);
        line-height: 1.5;
      }
      #ec-config-gate {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: rgba(17, 24, 39, 0.55);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="ec-config-gate">
      <p>Comprobando sesión…</p>
    </div>

    <div id="ec-config-app" class="ec-config-page hidden">
      <header class="ec-config-header">
        <div class="ec-config-brand">
          <i class="fa-solid fa-gear" aria-hidden="true"></i>
          <span>Configuración global</span>
        </div>
        <a class="btn-outline" href="admin.html">← Volver al panel</a>
      </header>
      <main class="ec-config-main">
        <h1 style="font-size: 1.35rem; margin: 0 0 0.5rem">Cuenta y seguridad</h1>
        <p class="ec-config-lead">
          Misma cuenta para <strong>EliteCard</strong> y <strong>MascotBook</strong>. Cambiá aquí la contraseña de acceso por correo.
        </p>
        <div class="admin-card">
          <h3 class="admin-card-title">Seguridad</h3>
          <p class="admin-card-hint">Cambiá la contraseña con la que iniciás sesión por correo electrónico.</p>
          <div class="field">
            <label for="global-pw-current">Contraseña actual</label>
            <input id="global-pw-current" type="password" autocomplete="current-password" />
          </div>
          <div class="field">
            <label for="global-pw-new">Nueva contraseña</label>
            <input id="global-pw-new" type="password" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="global-pw-confirm">Confirmar nueva contraseña</label>
            <input id="global-pw-confirm" type="password" autocomplete="new-password" />
          </div>
          <p id="global-pw-feedback" class="admin-card-hint" role="status" aria-live="polite" style="min-height: 1.25rem"></p>
          <button type="button" class="btn-outline" id="btn-global-update-password">Actualizar contraseña</button>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>

    <script>
      (function () {
        var t = Date.now();
        document.write('<script src="firebase-config.js?v=' + t + '"><\/script>');
      })();
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script>
      (function () {
        "use strict";

        var toastEl = document.getElementById("toast");
        var gate = document.getElementById("ec-config-gate");
        var app = document.getElementById("ec-config-app");

        function showToast(msg, ok) {
          if (!toastEl) return;
          toastEl.textContent = msg || "";
          toastEl.className = "toast show " + (ok ? "ok" : "err");
          setTimeout(function () {
            toastEl.classList.remove("show");
          }, 2600);
        }

        function setButtonBusy(btn, busy, busyText, idleText) {
          if (!btn) return;
          btn.disabled = !!busy;
          btn.textContent = busy ? busyText : idleText;
        }

        function userHasPasswordProvider(user) {
          if (!user || !user.providerData || !user.providerData.length) return false;
          for (var i = 0; i < user.providerData.length; i++) {
            if (user.providerData[i].providerId === "password") return true;
          }
          return false;
        }

        function firebaseAuthErrorMessage(err) {
          var code = err && err.code ? String(err.code) : "";
          if (code === "auth/wrong-password" || code === "auth/invalid-credential") {
            return "La contraseña actual no es correcta.";
          }
          if (code === "auth/weak-password") {
            return "La nueva contraseña es demasiado débil. Usá al menos 6 caracteres.";
          }
          if (code === "auth/invalid-email") {
            return "El correo de la cuenta no es válido.";
          }
          if (code === "auth/too-many-requests") {
            return "Demasiados intentos. Esperá unos minutos y probá de nuevo.";
          }
          if (code === "auth/network-request-failed") {
            return "Error de red. Comprobá tu conexión e intentá de nuevo.";
          }
          if (code === "auth/requires-recent-login") {
            return "Por seguridad, cerrá sesión, volvé a entrar e intentá otra vez.";
          }
          if (code === "auth/user-mismatch") {
            return "La sesión no coincide con esta cuenta.";
          }
          return err && err.message ? err.message : "No se pudo actualizar la contraseña.";
        }

        function setPwFeedback(el, text, ok) {
          if (!el) return;
          el.textContent = text || "";
          if (!text) {
            el.style.color = "";
            return;
          }
          el.style.color = ok ? "rgb(22, 101, 52)" : "rgb(185, 28, 28)";
        }

        var __ecPwFormBound = false;
        function bindPasswordForm() {
          if (__ecPwFormBound) return;
          __ecPwFormBound = true;
          var btn = document.getElementById("btn-global-update-password");
          var feedback = document.getElementById("global-pw-feedback");
          var cur = document.getElementById("global-pw-current");
          var neu = document.getElementById("global-pw-new");
          var conf = document.getElementById("global-pw-confirm");
          if (!btn || !cur || !neu || !conf) return;
          var idleLabel = "Actualizar contraseña";
          btn.addEventListener("click", function () {
            setPwFeedback(feedback, "", null);
            if (!firebase || !firebase.auth || typeof firebase.auth !== "function") {
              setPwFeedback(feedback, "Firebase no está disponible.", false);
              return;
            }
            var user = firebase.auth().currentUser;
            if (!user) {
              setPwFeedback(feedback, "No hay sesión activa.", false);
              return;
            }
            if (!userHasPasswordProvider(user)) {
              setPwFeedback(
                feedback,
                "Esta cuenta no usa correo y contraseña (por ejemplo, si entraste con Google). No podés cambiar la contraseña desde aquí.",
                false
              );
              return;
            }
            var email = user.email;
            if (!email) {
              setPwFeedback(feedback, "Tu cuenta no tiene un correo asociado.", false);
              return;
            }
            var currentPw = String(cur.value || "");
            var newPw = String(neu.value || "");
            var confirmPw = String(conf.value || "");
            if (!currentPw) {
              setPwFeedback(feedback, "Ingresá tu contraseña actual.", false);
              return;
            }
            if (newPw.length < 6) {
              setPwFeedback(feedback, "La nueva contraseña debe tener al menos 6 caracteres.", false);
              return;
            }
            if (newPw !== confirmPw) {
              setPwFeedback(feedback, "La nueva contraseña y la confirmación no coinciden.", false);
              return;
            }
            if (newPw === currentPw) {
              setPwFeedback(feedback, "La nueva contraseña debe ser distinta a la actual.", false);
              return;
            }
            setButtonBusy(btn, true, "Actualizando...", idleLabel);
            var credential = firebase.auth.EmailAuthProvider.credential(email, currentPw);
            user
              .reauthenticateWithCredential(credential)
              .then(function () {
                return user.updatePassword(newPw);
              })
              .then(function () {
                cur.value = "";
                neu.value = "";
                conf.value = "";
                setPwFeedback(feedback, "Contraseña actualizada correctamente.", true);
                showToast("Contraseña actualizada", true);
              })
              .catch(function (err) {
                var msg = firebaseAuthErrorMessage(err);
                setPwFeedback(feedback, msg, false);
                showToast(msg, false);
              })
              .then(function () {
                setButtonBusy(btn, false, "Actualizando...", idleLabel);
              });
          });
        }

        var cfg = window.FIREBASE_WEB_CONFIG;
        if (!cfg || !cfg.apiKey || String(cfg.apiKey).indexOf("REEMPLAZAR") !== -1) {
          if (gate) gate.innerHTML = "<p>Configurá <code>firebase-config.js</code></p>";
        } else {
          try {
            firebase.initializeApp(cfg);
          } catch (eInit) {}
          var nextSelf = "configuracion-global.html";
          firebase.auth().onAuthStateChanged(function (user) {
            if (!user) {
              try {
                location.replace("login.html?next=" + encodeURIComponent(nextSelf));
              } catch (eR) {
                location.href = "login.html";
              }
              return;
            }
            if (!user.emailVerified) {
              try {
                location.replace(
                  "verificar-email.html?next=" + encodeURIComponent(nextSelf)
                );
              } catch (eV) {
                location.replace("verificar-email.html");
              }
              return;
            }
            if (gate) gate.classList.add("hidden");
            if (app) app.classList.remove("hidden");
            bindPasswordForm();
          });
        }
      })();
    </script>
  </body>
</html>
